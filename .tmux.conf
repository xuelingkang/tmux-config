# =============================================================================
# 基本配置
# =============================================================================
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
#set -g base-index 1
#set -g pane-base-index 1

# =============================================================================
# 输入法切换（仅 macOS）
# =============================================================================
# 背景：macOS 上使用第三方输入法（如 Squirrel 鼠须管）时，C-b 进入 tmux 命令
# 模式后按键可能被输入法拦截，导致快捷键失效。解决方案是在每个可能触发输入
# 的场景前自动切到 ABC（英文）布局。
#
# 以下配置仅在 macOS（Darwin）上生效，Linux 等平台忽略。
# #{host_os} 是 tmux 3.3a+ 内置格式变量，等于 $(uname -s) 的输出。
%if #{==:#{host_os},Darwin}
# 方案一：进入 pane 时自动切换
# pane-focus-in 在光标移动到某个 pane 时触发，确保切 pane 后输入法为英文。
set-hook -g pane-focus-in 'run-shell "/usr/local/bin/InputSourceSelector select com.apple.keylayout.ABC"'

# 方案二：按 C-b（prefix）时切换
# 为什么将 prefix 设为 None？
# tmux 的 prefix 选项（默认 C-b）在 root 键表中的优先级高于 bind -n（即
# bind-key -T root）。如果 set -g prefix C-b，则按 C-b 时 tmux 会直接进入
# prefix 键表，不会执行 bind -n C-b 的绑定。
# 解决方式：set -g prefix None 禁用原生 prefix 键，然后用 bind -n C-b 完全
# 接管 C-b 按键：先切英文输入法，再手动进入 prefix 键表。这样既保持了原有
# 快捷键习惯（C-b <key>），又在进入命令模式前确保输入法为英文。
set -g prefix None
bind-key -n C-b run-shell "/usr/local/bin/InputSourceSelector select com.apple.keylayout.ABC" \; switch-client -T prefix

# 参考：
# https://man.openbsd.org/OpenBSD-6.8/tmux.1#prefix
# "prefix can be set to the special key 'None' to set no prefix."
%endif

# =============================================================================
# 快捷键
# =============================================================================
# Alt + hjkl — 方向键切换 pane（无需 prefix）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# =============================================================================
# 复制模式（vi 风格）
# =============================================================================
# v — 开始/取消选择
bind-key -T copy-mode-vi v if-shell -F "#{selection_active}" "send-keys -X clear-selection" "send-keys -X begin-selection"
# y — 复制选中内容并退出复制模式
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =============================================================================
# 插件
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# 主题
set -g @plugin 'nordtheme/tmux'

# 初始化插件管理器（必须放在末尾）
run '~/.tmux/plugins/tpm/tpm'
