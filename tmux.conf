# =============================================================================
# 基本配置
# =============================================================================
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
#set -g base-index 1
#set -g pane-base-index 1

# =============================================================================
# 输入法切换（macOS）
# =============================================================================
# macOS 第三方输入法会拦截 C-b，导致快捷键失效。用 prefix None + bind -n C-b
# 接管 C-b，先切英文再进入命令模式。pane-focus-in 确保切 pane 后也是英文。
# 仅在 macOS（Darwin）生效。
%if #{==:#{host_os},Darwin}
set-hook -g pane-focus-in 'run-shell "/usr/local/bin/InputSourceSelector select com.apple.keylayout.ABC"'
set -g prefix None
bind-key -n C-b run-shell "/usr/local/bin/InputSourceSelector select com.apple.keylayout.ABC" \; switch-client -T prefix
%endif

# =============================================================================
# 快捷键
# =============================================================================
# Alt + hjkl — 方向键切换 pane（无需 prefix）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Shift+Enter: tmux extended-keys on 会吞掉 CSI-u 序列，显式转发
bind -n S-Enter send-keys Escape \; send-keys -l '[13;2u'

# =============================================================================
# 复制模式（vi 风格）
# =============================================================================
# v — 开始/取消选择
bind-key -T copy-mode-vi v if-shell -F "#{selection_active}" "send-keys -X clear-selection" "send-keys -X begin-selection"
# y — 复制选中内容并退出复制模式
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =============================================================================
# 插件
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
%if #{WSL_DISTRO_NAME}
# 剪贴板：wsl-copy（PowerShell SetText）代替默认 clip.exe
set -g @override_copy_command '${HOME}/.tmux-config/wsl-bin/wsl-copy'

# 输入法：切 pane / 按 C-b 时自动切英文
set-hook -g pane-focus-in 'run-shell "${HOME}/.tmux-config/wsl-bin/weasel-mode ascii"'
set -g prefix None
bind-key -n C-b run-shell "${HOME}/.tmux-config/wsl-bin/weasel-mode ascii" \; switch-client -T prefix
%endif
set -g @plugin 'tmux-plugins/tmux-open'

# 主题
set -g @plugin 'nordtheme/tmux'

# 初始化插件管理器（必须放在末尾）
run '~/.tmux/plugins/tpm/tpm'
