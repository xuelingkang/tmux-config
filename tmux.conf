# =============================================================================
# 基本配置
# =============================================================================
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u

# =============================================================================
# 插件
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# 主题
set -g @plugin 'nordtheme/tmux'

# =============================================================================
# 窗口标题
# =============================================================================
# 切换 tmux session/window 时向终端更新窗口标题
set -g set-titles on
# 标题格式：session名 › window名
set -g set-titles-string "#S › #W"

# =============================================================================
# 输入法切换
# =============================================================================
# 进入 pane / 按 C-b 时自动切英文。用 prefix None + bind -n C-b 接管 C-b，
# 先切英文再进入命令模式。按平台自适应。

# macOS（Darwin）
if-shell 'uname -s | grep -qi Darwin' {
    set-hook -g pane-focus-in 'run-shell -b "${HOME}/.tmux-config/mac-bin/squirrel-mode ascii"'
    set -g prefix None
    bind-key -n C-b run-shell -b "${HOME}/.tmux-config/mac-bin/squirrel-mode ascii" \; switch-client -T prefix
}

# WSL
if-shell 'uname -a | grep -qi WSL' {
    set-hook -g pane-focus-in 'run-shell -b "${HOME}/.tmux-config/wsl-bin/weasel-mode ascii"'
    set -g prefix None
    bind-key -n C-b run-shell -b "${HOME}/.tmux-config/wsl-bin/weasel-mode ascii" \; switch-client -T prefix
}

# =============================================================================
# 快捷键
# =============================================================================
# Alt + hjkl — 方向键切换 pane（无需 prefix）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Shift+Enter — 显式转发 CSI-u 序列（extended-keys 会吞掉）
bind -n S-Enter send-keys Escape \; send-keys -l '[13;2u'

# =============================================================================
# 复制模式
# =============================================================================
# v — 切换选中状态
bind-key -T copy-mode-vi v if-shell -F "#{selection_active}" \
  "send-keys -X clear-selection" \
  "send-keys -X begin-selection"

# WSL: 剪贴板直通（PowerShell SetText），绕开中文编码问题
if-shell 'uname -a | grep -qi WSL' {
    set -g @override_copy_command '${HOME}/.tmux-config/wsl-bin/wsl-copy'
}

# 覆写插件默认：鼠标拖拽和 y 复制后不退出 copy-mode
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# TERM 自适应：termnfo 存在则继承外层 TERM，否则回退 xterm-256color
if-shell 'infocmp "$TERM" >/dev/null 2>&1' {
  set -g default-terminal "$TERM"
} {
  set -g default-terminal "xterm-256color"
}

# 初始化（必须放在末尾）
run '~/.tmux/plugins/tpm/tpm'

