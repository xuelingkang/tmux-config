# =============================================================================
# 基本配置
# =============================================================================
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u

# =============================================================================
# 输入法切换
# =============================================================================
# 进入 pane / 按 C-b 时自动切英文。用 prefix None + bind -n C-b 接管 C-b，
# 先切英文再进入命令模式。按平台自适应。

# macOS（Darwin）
%if #{==:#{host_os},Darwin}
set-hook -g pane-focus-in 'run-shell "${HOME}/.tmux-config/mac-bin/macism com.apple.keylayout.ABC"'
set -g prefix None
bind-key -n C-b run-shell "${HOME}/.tmux-config/mac-bin/macism com.apple.keylayout.ABC" \; switch-client -T prefix
%endif

# WSL
%if #{WSL_DISTRO_NAME}
set-hook -g pane-focus-in 'run-shell "${HOME}/.tmux-config/wsl-bin/weasel-mode ascii"'
set -g prefix None
bind-key -n C-b run-shell "${HOME}/.tmux-config/wsl-bin/weasel-mode ascii" \; switch-client -T prefix
%endif

# =============================================================================
# 快捷键
# =============================================================================
# Alt + hjkl — 方向键切换 pane（无需 prefix）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Shift+Enter — 显式转发 CSI-u 序列（extended-keys 会吞掉）
bind -n S-Enter send-keys Escape \; send-keys -l '[13;2u'

# =============================================================================
# 复制模式
# =============================================================================
# v — 切换选中状态
bind-key -T copy-mode-vi v if-shell -F "#{selection_active}" \
  "send-keys -X clear-selection" \
  "send-keys -X begin-selection"
# y — 复制并退出
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =============================================================================
# 插件
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# WSL: 剪贴板直通（PowerShell SetText），绕开中文编码问题
%if #{WSL_DISTRO_NAME}
set -g @override_copy_command '${HOME}/.tmux-config/wsl-bin/wsl-copy'
%endif

# 主题
set -g @plugin 'nordtheme/tmux'

# 初始化（必须放在末尾）
run '~/.tmux/plugins/tpm/tpm'
